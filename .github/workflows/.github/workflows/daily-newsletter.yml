name: Daily newsletter (07:00 UTC)

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: daily-newsletter
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: newsletter
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build and send the newsletter
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          RESEND_REPLY_TO: ${{ secrets.RESEND_REPLY_TO }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERTS_ENABLED: 'true'
          AI_PROVIDER_API_KEY: ${{ secrets.AI_PROVIDER_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          NEWSLETTER_PREVIEW_MODE: ${{ secrets.NEWSLETTER_PREVIEW_MODE }}
        run: npm run run:once
